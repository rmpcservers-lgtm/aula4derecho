<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Videoteca Jurídica</title>

  <link rel="stylesheet" href="style.css">

  <style>

    .video-wrapper{
      width:90%;
      max-width:1200px;
      margin:50px auto;
    }

    .video-wrapper h3{
      margin-bottom:20px;
      text-align:center;
    }

    .video-wrapper iframe{
      width:100%;
      height:700px;
      border:none;
      border-radius:15px;
      box-shadow:0 0 20px rgba(0,0,0,.4);
    }

    @media(max-width:768px){

      .video-wrapper iframe{
        height:300px;
      }

    }

  </style>

</head>

<body>

  <header>

    <div class="logo">
      ⚖️ Aula 4 Derecho
    </div>

    <nav>
      <a href="index.html">Inicio</a>
      <a href="index2.html">Biblioteca</a>
    </nav>

  </header>

  <section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

      <h1>Videoteca Jurídica</h1>

      <p>
        Tutoriales y material audiovisual de apoyo académico.
      </p>

    </div>

  </section>

  <section class="material">

    <h2>Tutoriales</h2>

    <div class="video-wrapper">

      <h3>Cómo ingresar al Aula</h3>

      <iframe
  src="https://player.vimeo.com/video/1196855471?badge=0&autopause=0&player_id=0&app_id=58479"
  width="100%"
  height="700"
  frameborder="0"
  allow="autoplay; fullscreen; picture-in-picture"
  allowfullscreen>
</iframe>

    </div>

    <!-- DUPLICA ESTE BLOQUE PARA MÁS VIDEOS -->

  </section>

  <footer>

    </p>

  </footer>

</body>
</html>
